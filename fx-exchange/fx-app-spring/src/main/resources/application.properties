spring.application.name=fx-app-spring
server.port=8080

# fxdb — designed & seeded by you on W1D3 (ops/fxdb-seed.sql)
spring.datasource.url=jdbc:mysql://localhost:3306/fxdb
spring.datasource.username=appuser
spring.datasource.password=apppass

# Error hardening — Spring's own fallback error page must never leak internals either
# (your @RestControllerAdvice handles the paths it knows; these cover the rest).
server.error.include-message=never
server.error.include-stacktrace=never

# Activity 3 — Liquibase runs at startup, before the app serves a single request.
# The schema is now code in this repo, not a .sql file someone remembered to import.
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Activity 5 — where to ACK batches back to. localhost:8081 when you run from the IDE,
# the compose SERVICE NAME when you run in the stack. Configuration, not a constant.
fx.orchestrator.url=${FX_ORCHESTRATOR_URL:http://localhost:8081}
